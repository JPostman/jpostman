# Supported rule formats:
# KEY                         -> key rule
# /KEY/SUB_KEY                -> JSON path rule
# /KEY/*/SUB_KEY              -> JSON path wildcard rule, * matches one path segment
# /**/KEY                     -> JSON path wildcard rule, ** matches any number of path segments
# KEY[-4:]                    -> key rule with slice, keeps the last 4 characters
# KEY[:3]                     -> key rule with slice, keeps the first 3 characters
# KEY[regex:^\+\d{1,2}]       -> key rule with regex value expression
# regex:.*KEY.*               -> regex key rule
# regex:(?i).*KEY.*           -> case-insensitive regex key rule
# regex:/KEY/\d+/SUB_KEY      -> regex JSON path rule

# Default policy rules
[default]
unsecret=baseUrl

# Body
redact=authorization,api-key,password,token,Content-Type[-4:]
filter=accessToken,refreshToken,expiresIn

# Headers
headers=Authorization,Cookie,Set-Cookie,X-API-Key
headersFilter=Date,Set-Cookie

# Login page
[login]
extends=default
redact=username

[debug_login]
extends=login
unredact=accessToken
unheaders=Set-Cookie

# Forgot password page
[forgot]
extends=login
redact=confirm_password

[debug_forgot]
extends=default
unredact=password
unheaders=X-API-Key
