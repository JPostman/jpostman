[base]
statusCode=200
exists=id,firstName
notExists=missing
pathNotNull=id
pathEquals=firstName=John
compare=id>=1,id<2,active=true
allMatch=/**/stock > 0, /**/price > 0, /**/discount < 25

# Circular inheritance validation
[a]
extends=b
statusCode=200

[b]
extends=a

# Unsupported rule validation
[unsupported]
unsupported=value

# Request-section precedence validation
[Get all products]
exists=id

[product]
exists=title,price
