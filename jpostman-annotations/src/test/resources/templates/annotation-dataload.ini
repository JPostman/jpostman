# Supported JPostman data formats:
# type=map                         -> key/value data
# type=json                        -> inline JSON object
# type=xml                         -> inline XML object
# source=file.json                 -> load JSON from file
# source=file.xml                  -> load XML from file
#
# Supported expressions:
# {{jpostman:env[key]}}            -> environment value
# {{jpostman:secret[key]}}         -> secret value
# {{jpostman:plain[key]}}          -> plain value
# {{jpostman:cache[key]}}          -> cached value
# {{jpostman:body[key]}}           -> current info body value
# {{jpostman:[user]firstName}}     -> path from cached context "user"
# {{jpostman:[user]/**/lastName}}  -> wildcard path from cached context "user"


[mouse]
type=map
title={{jpostman:env[productTitle]}},
description={{jpostman:env[productDesc]}}
price=25
discountPercentage=5
stock=120
rating=4.3
brand=Logitech
category=electronics

[keyboard]
type=json
{
  "productTitle": "Gaming Keyboard",
  "productDesc": "Mechanical keyboard recommended for {{jpostman:[user]firstName}} {{jpostman:[user]/**/lastName}}.",
  "productPrice": 75,
  "productDiscount": 10,
  "productStock": 60,
  "productRating": 4.6,
  "productBrand": "Razer",
  "productCategory": "electronics"
}

[shoes]
type=xml
source=shoes.xml